# ======================
# Prefix Key: Ctrl+Space
# ======================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ======================
# General Settings
# ======================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on                    # Enable mouse support
set -g base-index 1                # Start windows at 1, not 0
setw -g pane-base-index 1          # Start panes at 1
set -g renumber-windows on         # Renumber windows when one is closed
set -g history-limit 50000         # Scrollback buffer (10k was too low)
set -g escape-time 0               # No delay for escape key
set -g allow-passthrough on        # Allow clipboard passthrough
set -g focus-events on             # Enable focus events (needed for vim autoread)
set -g display-panes-time 2000     # Show pane numbers for 2 seconds
set -g display-time 2000           # Show messages for 2 seconds

# ======================
# Pane Borders & Labels
# ======================
# Show pane title at bottom - ACTIVE pane gets highlighted label
set -g pane-border-status bottom
set -g pane-border-format '#{?pane_active,#[fg=#1e1e2e]#[bg=#89b4fa]#[bold] #P: #{pane_title} #[default],#[fg=#6c7086] #P: #{pane_title} }'

# Border colors - bright blue for active, dim for inactive
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'
set -g pane-border-lines heavy

# ======================
# Clipboard (works over SSH via OSC 52)
# ======================
set -g set-clipboard on
setw -g mode-keys vi               # Use vim keys in copy mode

# OSC 52 copy command - works over SSH! Terminal intercepts and copies locally
# Falls back to pbcopy/xclip when not over SSH
COPY_CMD="sh -c 'if [ -n \"$SSH_TTY\" ]; then printf \"\\033]52;c;%s\\a\" \"$(base64 | tr -d \"\\n\")\" > /dev/tty; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; fi'"

# Enter copy mode: prefix + v (or prefix + [)
bind v copy-mode
# Select with v, yank with y
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "$COPY_CMD"

# Mouse selection copies to system clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$COPY_CMD"
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "$COPY_CMD"

# Double-click to copy word
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "$COPY_CMD"
bind -T copy-mode DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "$COPY_CMD"

# Paste: use tmux buffer (prefix + p) - for SSH, use your terminal's paste
bind p paste-buffer

# ======================
# Easy Window/Pane Creation
# ======================
bind c new-window -c "#{pane_current_path}"      # New window in current dir
bind \\ split-window -h -c "#{pane_current_path}" # Split vertical
bind - split-window -v -c "#{pane_current_path}" # Split horizontal

# ======================
# Pane Resizing (Vim-style with prefix + arrow keys)
# ======================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ======================
# Window Reordering
# ======================
bind -r < swap-window -t -1 \; select-window -t -1  # Move window left
bind -r > swap-window -t +1 \; select-window -t +1  # Move window right

# ======================
# Navigation (Vim-style)
# ======================
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Smart pane switching with vim-tmux-navigator
# Ctrl+h/j/k/l works in both neovim and tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Quick pane switch
bind -n C-\\ select-pane -t +       # Ctrl+\ = cycle panes (no prefix)
bind 1 select-pane -t 1             # prefix+1 = pane 1 (claude-code)
bind 2 select-pane -t 2             # prefix+2 = pane 2 (terminal)
bind 3 select-pane -t 3             # prefix+3 = pane 3 (pymol)

# ======================
# Session Management
# ======================
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session
bind s choose-tree -sZ                # Session picker (interactive)
bind w choose-tree -wZ                # Window picker (interactive)
bind R command-prompt -p "Rename session:" "rename-session '%%'"

# ======================
# Quick Session Switching
# ======================
bind ( switch-client -p              # Previous session
bind ) switch-client -n              # Next session
bind Tab switch-client -l            # Toggle last session (huge time-saver)

# ======================
# Fuzzy Session Finder (fzf popup)
# ======================
# prefix + f = fuzzy switch to any session or window
bind f display-popup -E -w 60% -h 60% "\
  (tmux list-sessions -F '[session] #S (#{session_windows} wins)'; \
   tmux list-windows -a -F '[window] #S:#I #W') | \
  fzf --reverse --header='Switch Session/Window' --preview='tmux capture-pane -ep -t {2}' --preview-window=right:50% | \
  awk '{print \$2}' | \
  xargs -I{} tmux switch-client -t {}"

# prefix + F = create new session from project directory
bind F display-popup -E -w 60% -h 60% "\
  find ~/projects ~/repos ~/code -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort | \
  fzf --reverse --header='New Session from Project' | \
  xargs -I{} sh -c 'name=\$(basename {}); tmux new-session -ds \"\$name\" -c {} 2>/dev/null; tmux switch-client -t \"\$name\"'"

# prefix + g = kill sessions interactively (multi-select with Tab)
bind g display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#S (#{session_windows} wins)' | \
  fzf --reverse --multi --header='Kill Sessions (Tab to select multiple)' | \
  awk '{print \$1}' | \
  xargs -I{} tmux kill-session -t {}"

# ======================
# Reload Config
# ======================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ======================
# Status Bar
# ======================
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left-length 40

# Left: Session name (turns RED when prefix is active)
set -g status-left '#{?client_prefix,#[fg=#1e1e2e]#[bg=#f38ba8]#[bold] #S #[default] ,#[fg=#1e1e2e]#[bg=#89b4fa]#[bold] #S #[default] }'

# Right: Session count + Window count + Date/Time
set -g status-right-length 80
set -g status-right '#[fg=#cba6f7,bold]#(tmux list-sessions | wc -l | tr -d " ") sess #[fg=#a6adc8]| #I/#(tmux list-windows | wc -l | tr -d " ") wins #[fg=#1e1e2e,bg=#a6e3a1,bold] %H:%M '

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#f9e2af,bold] #I:#W #[fg=#f9e2af,bg=default]'

# ======================
# Plugins (via TPM)
# ======================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto save/restore sessions

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Continuum settings
set -g @continuum-restore 'on'                 # Auto-restore on tmux start
set -g @continuum-save-interval '15'           # Auto-save every 15 minutes

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
